<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recycling PA/PE | Polymer Consult</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#fff;color:#1f2937;line-height:1.8}
.lang-bar{position:fixed;top:0;right:0;z-index:999;display:flex;gap:4px;padding:8px 14px;background:rgba(15,59,44,.95);border-bottom-left-radius:12px}
.lang-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:11px;font-weight:700;padding:4px 11px;cursor:pointer;border-radius:4px}
.lang-btn.active{background:#e67e22;border-color:#e67e22}
.hero{background:linear-gradient(120deg,#f0fdf4,#e6f7ef);padding:5rem 2rem 3rem;text-align:center}
.container{max-width:860px;margin:0 auto;padding:3rem 1.5rem}
.btn-wa{display:inline-block;background:#25d366;color:#fff;font-weight:700;text-decoration:none;padding:.75rem 2rem;border-radius:2rem}
</style>
</head>
<body>
<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('de')">DE</button>
  <button class="lang-btn" onclick="setLang('en')">EN</button>
  <button class="lang-btn" onclick="setLang('ru')">RU</button>
</div>
<div class="hero">
  <h1 data-de="Wirtschaftlichkeit des Recyclings" data-en="Economics of Recycling" data-ru="Экономика рециклинга"></h1>
  <p data-de="Analyse der Verluste und Möglichkeiten." data-en="Analysis of losses and opportunities." data-ru="Анализ потерь и возможностей."></p>
  <a href="https://wa.me/4915258400610" class="btn-wa">WhatsApp</a>
</div>
<script>
function setLang(lang){
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.lang-btn').forEach(b=>{if(b.getAttribute('onclick').includes("'"+lang+"'"))b.classList.add('active')});
  document.querySelectorAll('[data-'+lang+']').forEach(el=>el.innerHTML=el.getAttribute('data-'+lang));
  localStorage.setItem('lang',lang);
}
setLang(localStorage.getItem('lang')||'de');
</script>
</body>
</html>
