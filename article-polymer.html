<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recycling PA/PE | Polymer Consult</title>
<style>
  body{font-family:sans-serif;padding:2rem;line-height:1.6}
  .lang-bar{position:fixed;top:0;right:0;padding:10px;background:#0f3b2c}
  .lang-btn{color:#fff;cursor:pointer;margin-left:5px;border:1px solid #fff;background:none;padding:2px 5px}
  .lang-btn.active{background:#e67e22}
</style>
</head>
<body>
<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('de')">DE</button>
  <button class="lang-btn" onclick="setLang('en')">EN</button>
  <button class="lang-btn" onclick="setLang('ru')">RU</button>
</div>
<h1 data-de="Wirtschaftlichkeit des Recyclings" data-en="Economics of Recycling" data-ru="Экономика рециклинга"></h1>
<p data-de="Verluste ≈ 10,5 Mio. Euro pro Jahr." data-en="Losses ≈ €10.5 million/year." data-ru="Потери ≈ 10,5 млн евро в год."></p>
<script>
function setLang(lang){
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.lang-btn').forEach(b=>{if(b.getAttribute('onclick').includes("'"+lang+"'"))b.classList.add('active')});
  document.querySelectorAll('[data-'+lang+']').forEach(el=>el.innerHTML=el.getAttribute('data-'+lang));
  localStorage.setItem('lang',lang);
}
setLang(localStorage.getItem('lang')||'de');
</script>
</body>
</html>
