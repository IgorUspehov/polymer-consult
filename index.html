<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ihor Kryazhev - Technologieberater für Sekundärpolymere</title>
<link rel="stylesheet" href="style.css">
<style>
.lang-switch { text-align: right; padding: 10px 20px; background: #0d1117; border-bottom: 1px solid #334155; }
.lang-btn { background: #1e293b; color: #94a3b8; border: 1px solid #334155; padding: 5px 10px; margin: 0 3px; cursor: pointer; border-radius: 4px; }
.lang-btn.active { background: #f97316; color: white; border-color: #f97316; }
.lang-content { display: none; }
.lang-content.active { display: block; }
</style>
</head>
<body>
<div class="lang-switch">
  <button class="lang-btn" data-lang="de">🇩🇪 Deutsch</button>
  <button class="lang-btn" data-lang="en">🇬🇧 English</button>
  <button class="lang-btn" data-lang="ru">🇷🇺 Русский</button>
</div>

<div id="lang-de" class="lang-content active">
  <div class="original-content">INHALT VON index.html (DE)</div>
</div>
<div id="lang-en" class="lang-content">
  <div class="original-content">CONTENT FROM index.html (EN)</div>
</div>
<div id="lang-ru" class="lang-content">
  <div class="original-content">СОДЕРЖИМОЕ index.html (RU)</div>
</div>

<script>
  const btns = document.querySelectorAll('.lang-btn');
  const contents = document.querySelectorAll('.lang-content');
  function setLang(lang) {
    contents.forEach(c => c.classList.remove('active'));
    document.getElementById('lang-'+lang).classList.add('active');
    btns.forEach(b => b.classList.remove('active'));
    document.querySelector(`.lang-btn[data-lang="${lang}"]`).classList.add('active');
    localStorage.setItem('lang', lang);
  }
  btns.forEach(btn => btn.addEventListener('click', () => setLang(btn.dataset.lang)));
  const saved = localStorage.getItem('lang');
  setLang(saved && ['de','en','ru'].includes(saved) ? saved : 'de');
</script>
</body>
</html>
